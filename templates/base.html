{% load static %}
<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}Арифметический тренажёр{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/styles.css' %}" />
  </head>
  <body>
    <header class="header">
      <div class="container header__inner">
        <a class="brand" href="{% url 'home' %}">Арифметический тренажёр</a>
        <nav class="nav">
          <a class="nav__link" href="{% url 'settings' %}">Настройки</a>
        </nav>
      </div>
    </header>
    <main class="container">
      {% block content %}{% endblock %}
    </main>
    <footer class="footer">
      <div class="container footer__inner">Учебный проект на Django</div>
    </footer>
  </body>
</html>
